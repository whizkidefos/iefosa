<section class="uk-section">
  <div class="uk-container">

    <div class="uk-flex-middle" uk-grid>
      <div class="uk-width-1-2@m">
        <aside class="contact-info">

          <h3 class="contact-info-subtitle">Ring me up (WhatsApp/Telegram)</h3>

            <p class="uk-small">
              You need more information or just want to chat about a product or an idea? Fill out the form below or use any of the contact info present on this page to get in touch.

            <div class="uk-margin">
              <input class="uk-input" type="text" placeholder="Full Name" required>
            </div>
            <div class="uk-margin">
              <input class="uk-input" type="email" placeholder="Email" required>
            </div>

            <div class="uk-margin">
              <select class="uk-select">
                <option>I need more info</option>
                <option>I need a quote</option>
                <option>Just want to chat</option>
              </select>
            </div>

            <div class="uk-margin">
              <textarea class="uk-textarea" rows="5" placeholder="Textarea"></textarea>
            </div>

            <div class="uk-margin">
              <input class="uk-button uk-button-secondary" type="button" value="Submit">
            </div>

          </fieldset>
        </form>
      </div>
    </div>

  </div>
